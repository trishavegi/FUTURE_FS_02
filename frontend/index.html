<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>LeadMaster CRM | Mobile Friendly</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login Screen -->
  <div class="login-container" id="loginContainer">
    <div class="login-card">
      <div class="login-header">
        <i class="fas fa-chart-line"></i>
        <h2>LeadMaster CRM</h2>
        <p>Client Lead Management System</p>
      </div>
      <form id="loginForm">
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" placeholder="Username" id="loginUsername" required>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" placeholder="Password" id="loginPassword" required>
        </div>
        <button type="submit" class="login-btn">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>
      <div class="demo-cred">
        <p><i class="fas fa-info-circle"></i> admin / admin123</p>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard" style="display: none;">
    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="dashboard">
        <i class="fas fa-tachometer-alt"></i>
        <span>Dashboard</span>
      </button>
      <button class="nav-btn" data-tab="leads">
        <i class="fas fa-users"></i>
        <span>Leads</span>
      </button>
      <button class="nav-btn" data-tab="new-lead">
        <i class="fas fa-plus-circle"></i>
        <span>Add</span>
      </button>
      <button class="nav-btn" id="logoutBtnMobile">
        <i class="fas fa-sign-out-alt"></i>
        <span>Exit</span>
      </button>
    </nav>

    <main class="main-content">
      <!-- Top Header -->
      <div class="mobile-header">
        <h2>LeadMaster</h2>
        <div class="header-stats">
          <span id="totalLeadsBadge">0</span> total
        </div>
      </div>

      <!-- Dashboard Tab -->
      <div id="dashboardTab" class="tab-content active">
        <!-- Stats Cards - Mobile Optimized -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon blue"><i class="fas fa-users"></i></div>
            <div class="stat-info"><h3 id="totalLeads">0</h3><p>Total</p></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green"><i class="fas fa-envelope"></i></div>
            <div class="stat-info"><h3 id="newLeads">0</h3><p>New</p></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon orange"><i class="fas fa-phone-alt"></i></div>
            <div class="stat-info"><h3 id="contactedLeads">0</h3><p>Contacted</p></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon purple"><i class="fas fa-trophy"></i></div>
            <div class="stat-info"><h3 id="convertedLeads">0</h3><p>Converted</p></div>
          </div>
        </div>

        <!-- Recent Leads - Mobile Card View -->
        <div class="recent-leads-card">
          <h3>Recent Leads</h3>
          <div id="recentLeadsMobile" class="mobile-card-list"></div>
        </div>
      </div>

      <!-- All Leads Tab -->
      <div id="leadsTab" class="tab-content">
        <div class="search-section">
          <input type="text" id="searchLead" placeholder="🔍 Search by name or email..." class="search-input">
          <select id="statusFilter" class="filter-select">
            <option value="all">All Status</option>
            <option value="new">New</option>
            <option value="contacted">Contacted</option>
            <option value="converted">Converted</option>
          </select>
        </div>
        <div id="allLeadsMobile" class="mobile-card-list"></div>
        <button id="refreshLeadsBtn" class="refresh-btn-fab"><i class="fas fa-sync-alt"></i></button>
      </div>

      <!-- Add Lead Tab -->
      <div id="newLeadTab" class="tab-content">
        <div class="form-container">
          <h2>Add New Lead</h2>
          <form id="addLeadForm">
            <div class="form-group">
              <label>Full Name *</label>
              <input type="text" id="leadName" placeholder="Enter full name" required>
            </div>
            <div class="form-group">
              <label>Email *</label>
              <input type="email" id="leadEmail" placeholder="client@example.com" required>
            </div>
            <div class="form-group">
              <label>Phone *</label>
              <input type="tel" id="leadPhone" placeholder="+91 XXXXX XXXXX" required>
            </div>
            <div class="form-group">
              <label>Lead Source</label>
              <select id="leadSource">
                <option value="website">Website</option>
                <option value="referral">Referral</option>
                <option value="social_media">Social Media</option>
                <option value="walk_in">Walk-in</option>
              </select>
            </div>
            <div class="form-group">
              <label>Notes</label>
              <textarea id="leadNotes" rows="3" placeholder="Additional information..."></textarea>
            </div>
            <button type="submit" class="submit-btn"><i class="fas fa-save"></i> Save Lead</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <!-- Lead Detail Modal -->
  <div id="leadModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <div id="leadDetailContent"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
